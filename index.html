<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopManager · Acceso</title>
<link rel="icon" href="img/favi.png" type="image/x-icon">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Calibri',system-ui,sans-serif;}
body{
  background:linear-gradient(135deg,#1a2332 0%,#243049 60%,#1e3a5f 100%);
  display:flex;align-items:center;justify-content:center;min-height:100vh;
}
.card{
  background:#fff;border-radius:18px;padding:38px 42px 34px;width:350px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
  animation:cardIn .35s cubic-bezier(.4,0,.2,1);
}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.97);}to{opacity:1;transform:translateY(0)scale(1);}}
.logo{width:44px;height:44px;object-fit:contain;display:block;margin:0 auto 10px;}
.title{font-size:21px;font-weight:800;color:#0d2020;text-align:center;margin-bottom:3px;letter-spacing:-.3px;}
.sub{font-size:11px;color:#8aabaa;text-align:center;margin-bottom:28px;text-transform:uppercase;letter-spacing:1px;}
.fl{font-size:11px;font-weight:600;color:#4a6565;display:block;margin-bottom:5px;}
.fi{
  width:100%;padding:11px 14px;border:1.5px solid #d8e4e3;border-radius:9px;
  font-size:14px;outline:none;color:#0d2020;transition:border-color .2s,box-shadow .2s;
  font-family:inherit;margin-bottom:14px;background:#fff;
}
.fi:focus{border-color:#00897b;box-shadow:0 0 0 3px rgba(0,137,123,.1);}
.btn{
  width:100%;margin-top:6px;padding:13px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#264643,#005169);color:#fff;
  font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.2px;
  box-shadow:0 4px 14px rgba(0,137,123,.3);transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;
}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}
.err{color:#b0202e;font-size:12px;margin-top:10px;min-height:16px;text-align:center;font-weight:600;}
.spinner{display:none;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes shake{
  0%,100%{transform:translateX(0);}20%{transform:translateX(-5px);}
  40%{transform:translateX(5px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}
}
.shake{animation:shake .35s ease;}
</style>
</head>
<body>
<div class="card">
  <img src="img/favi.png" alt="Logo" class="logo">
  <div class="title">ShopManager</div>
  <div class="sub">Control de tiendas</div>

  <label class="fl">Usuario</label>
  <input type="text" id="l-user" class="fi" placeholder="tu_usuario" autocomplete="username"
    onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()">

  <label class="fl">Contraseña</label>
  <input type="password" id="l-pass" class="fi" placeholder="••••••••" autocomplete="current-password"
    onkeydown="if(event.key==='Enter')doLogin()" style="margin-bottom:0;">

  <button class="btn" id="btn-login" onclick="doLogin()">
    <div class="spinner" id="sp-login"></div>
    <span id="txt-login">Entrar</span>
  </button>
  <div class="err" id="err-login"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
const _SK = 'mm_session';

// Si ya hay sesión válida, ir directo
(function(){
  try {
    const s = JSON.parse(localStorage.getItem(_SK)||'null');
    if (s && s.uid && (Date.now()-s.ts) < 8*60*60*1000) window.location.href='app.html';
  } catch{}
})();

async function _sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function _setLoading(on) {
  document.getElementById('btn-login').disabled = on;
  document.getElementById('sp-login').style.display = on ? 'block' : 'none';
  document.getElementById('txt-login').textContent  = on ? 'Verificando...' : 'Entrar';
}

function _shake(id) {
  const el = document.getElementById(id);
  el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
  setTimeout(()=>el.classList.remove('shake'),400);
}

async function doLogin() {
  const usuario = document.getElementById('l-user').value.trim().toLowerCase();
  const pass    = document.getElementById('l-pass').value;
  const errEl   = document.getElementById('err-login');
  errEl.textContent = '';

  if (!usuario) { errEl.textContent='Ingresa tu usuario.'; _shake('l-user'); return; }
  if (!pass)    { errEl.textContent='Ingresa tu contraseña.'; _shake('l-pass'); return; }

  _setLoading(true);
  try {
    const hash = await _sha256(pass);

    // 1. Buscar usuario en Firestore
    const snap = await _db.collection('usuarios').where('usuario','==',usuario).limit(1).get();

    // Si es admin (campo usuario='admin' en doc raíz config/auth)
    if (usuario === 'admin') {
      const authSnap = await _db.collection('config').doc('auth').get();
      if (!authSnap.exists) { errEl.textContent='No hay cuenta admin configurada.'; _setLoading(false); return; }
      if (authSnap.data().hash !== hash) { errEl.textContent='Contraseña incorrecta.'; _shake('l-pass'); _setLoading(false); return; }
      localStorage.setItem(_SK, JSON.stringify({ uid:'admin', rol:'admin', usuario:'admin', ts:Date.now() }));
      window.location.href = 'app.html';
      return;
    }

    // Usuario normal
    if (snap.empty) { errEl.textContent='Usuario no encontrado.'; _shake('l-user'); _setLoading(false); return; }
    const userDoc = snap.docs[0];
    const userData = userDoc.data();

    if (!userData.activo) { errEl.textContent='Usuario desactivado. Contacta al administrador.'; _setLoading(false); return; }

    // Verificar contraseña en su config
    const authSnap = await _db.collection(`usuarios/${userDoc.id}/config`).doc('auth').get();
    if (!authSnap.exists || authSnap.data().hash !== hash) {
      errEl.textContent='Contraseña incorrecta.'; _shake('l-pass'); _setLoading(false); return;
    }

    localStorage.setItem(_SK, JSON.stringify({
      uid: userDoc.id, rol: userData.rol||'usuario',
      usuario: userData.usuario, nombre: userData.nombre, ts: Date.now()
    }));
    window.location.href = 'app.html';

  } catch(e) {
    console.error(e);
    errEl.textContent = 'Error de conexión. Intenta de nuevo.';
    _setLoading(false);
  }
}
</script>
</body>
</html>
