<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meli Manager — Acceso</title>
<link rel="icon" href="img/favi.png" type="image/x-icon">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Calibri',system-ui,sans-serif;}
body{
  background:linear-gradient(135deg,#1a2332 0%,#243049 60%,#1e3a5f 100%);
  display:flex;align-items:center;justify-content:center;min-height:100vh;
}

.login-card{
  background:#fff;border-radius:18px;padding:40px 44px;width:340px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;
  animation:cardIn .4s cubic-bezier(.4,0,.2,1);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(24px) scale(.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.login-logo{width:44px;height:44px;object-fit:contain;margin-bottom:10px;}
.login-title{font-size:20px;font-weight:800;color:#0d2020;margin-bottom:3px;letter-spacing:-.3px;}
.login-sub{font-size:11px;color:#8aabaa;margin-bottom:28px;text-transform:uppercase;letter-spacing:1px;}

.login-input{
  width:100%;padding:12px 16px;
  border:2px solid #d8e4e3;border-radius:10px;
  font-size:15px;outline:none;text-align:center;letter-spacing:1px;
  color:#0d2020;transition:border-color .2s,box-shadow .2s;
  font-family:inherit;
}
.login-input:focus{border-color:#00897b;box-shadow:0 0 0 3px rgba(0,137,123,.12);}

.login-error{
  color:#b0202e;font-size:12px;margin-top:8px;min-height:18px;
  transition:opacity .2s;
}

.login-btn{
  width:100%;margin-top:14px;padding:13px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#264643,#005169);color:#fff;
  font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.3px;
  box-shadow:0 4px 14px rgba(0,137,123,.35);transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:inherit;
}
.login-btn:hover{opacity:.88;transform:translateY(-1px);}
.login-btn:active{transform:translateY(0);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

/* Spinner de carga */
.login-loading{
  display:none;flex-direction:column;align-items:center;gap:14px;margin-top:24px;
}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin-svg{animation:spin 1s linear infinite;}

.login-footer{font-size:10px;color:#b8d0cf;margin-top:20px;}

/* Shake en error */
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-6px);}
  40%{transform:translateX(6px);}
  60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);}
}
.shake{animation:shake .38s ease;}
</style>
</head>
<body>

<div class="login-card">
  <img src="img/melimanager2.png" alt="Logo" class="login-logo">
  <div class="login-title">Meli Manager</div>
  <div class="login-sub">Acceso seguro</div>

  <input
    type="password"
    id="login-input"
    class="login-input"
    placeholder="Ingresa tu código"
    autocomplete="current-password"
    onkeydown="if(event.key==='Enter') verificarAcceso()"
  >
  <div class="login-error" id="login-error"></div>

  <button class="login-btn" id="login-btn" onclick="verificarAcceso()">
    <span id="login-btn-text">Entrar</span>
  </button>

  <div class="login-loading" id="login-loading">
    <div style="position:relative;width:52px;height:52px;">
      <svg class="spin-svg" viewBox="0 0 52 52" width="52" height="52">
        <circle cx="26" cy="26" r="22" fill="none" stroke="#e0f2f1" stroke-width="4"/>
        <circle cx="26" cy="26" r="22" fill="none" stroke="#00897b" stroke-width="4"
          stroke-dasharray="34 100" stroke-linecap="round"/>
      </svg>
    </div>
    <div style="font-size:13px;font-weight:600;color:#00695c;" id="login-loading-msg">
      Verificando acceso...
    </div>
  </div>

  <div class="login-footer">El código es administrado por el propietario</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
// ── Constantes de sesión ──
const _SESSION_KEY = 'mm_auth_ok';
const _SESSION_TTL = 8 * 60 * 60 * 1000; // 8 horas

function _checkSession() {
  try {
    const raw = localStorage.getItem(_SESSION_KEY);
    if (!raw) return false;
    const { ts } = JSON.parse(raw);
    return (Date.now() - ts) < _SESSION_TTL;
  } catch { return false; }
}

async function _hashCode(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function verificarAcceso() {
  const input  = document.getElementById('login-input').value;
  const errEl  = document.getElementById('login-error');
  const btnEl  = document.getElementById('login-btn');
  const loadEl = document.getElementById('login-loading');
  const msgEl  = document.getElementById('login-loading-msg');
  const inputEl= document.getElementById('login-input');

  errEl.textContent = '';
  if (!input) {
    errEl.textContent = 'Ingresa el código de acceso.';
    inputEl.classList.add('shake');
    setTimeout(() => inputEl.classList.remove('shake'), 400);
    return;
  }

  btnEl.style.display  = 'none';
  loadEl.style.display = 'flex';
  inputEl.disabled = true;

  const reset = (err) => {
    btnEl.style.display  = 'flex';
    loadEl.style.display = 'none';
    inputEl.disabled = false;
    inputEl.value = '';
    inputEl.focus();
    if (err) {
      errEl.textContent = err;
      inputEl.classList.add('shake');
      setTimeout(() => inputEl.classList.remove('shake'), 400);
    }
  };

  try {
    msgEl.textContent = 'Conectando con Firebase...';
    const snap = await _db.collection('config').doc('auth').get();
    if (!snap.exists) { reset('⚠️ No hay código configurado en la BD.'); return; }

    msgEl.textContent = 'Comprobando código...';
    const hashGuardado  = snap.data().hash;
    const hashIngresado = await _hashCode(input);

    if (hashIngresado === hashGuardado) {
      msgEl.textContent = 'Acceso concedido · Cargando...';
      localStorage.setItem(_SESSION_KEY, JSON.stringify({ ts: Date.now() }));
      await new Promise(r => setTimeout(r, 500));
      window.location.href = 'app.html';
    } else {
      reset('Código incorrecto. Intenta de nuevo.');
    }
  } catch(e) {
    reset('Error al conectar con Firebase.');
    console.error(e);
  }
}

// Si ya hay sesión, ir directo a la app
document.addEventListener('DOMContentLoaded', () => {
  if (_checkSession()) {
    window.location.href = 'app.html';
  } else {
    document.getElementById('login-input').focus();
  }
});
</script>
</body>
</html>
